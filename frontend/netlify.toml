[build]
  base = "frontend"
  command = "cd .. && npx pnpm install --frozen-lockfile && npx nx build frontend --configuration=production && node scripts/inject-env.js"
  publish = "../dist/frontend/browser"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
